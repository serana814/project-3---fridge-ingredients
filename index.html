<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fridge Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    #search-bar {
      margin-bottom: 20px;
    }

    #ingredientInput {
      padding: 8px;
      width: 250px;
    }

    #searchBtn {
      padding: 8px 16px;
    }

    /* Grid of meal cards */
    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .meal-card {
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
    }

    .meal-card img {
      width: 100%;
    }

    .meal-card p {
      padding: 8px;
      margin: 0;
      font-size: 14px;
    }

    /* Favorites section */
    #favorites-section {
      margin-top: 40px;
    }

    #favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    /* Modal overlay */
    #modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    /* Modal box */
    #modal-content {
      background: white;
      padding: 24px;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    #close-btn {
      float: right;
      cursor: pointer;
      font-size: 20px;
      border: none;
      background: none;
    }

    .save-btn {
      padding: 8px 16px;
      margin-top: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Fridge Finder</h1>
  <p>Enter an ingredient to find meals you can make.</p>

  <div id="search-bar">
    <input type="text" id="ingredientInput" placeholder="Enter an ingredient...">
    <button id="searchBtn">Search</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <!-- Favorites section -->
  <div id="favorites-section">
    <h2>My Favorites</h2>
    <div id="favorites-grid"></div>
  </div>

  <!-- Modal -->
  <div id="modal">
    <div id="modal-content">
      <button id="close-btn">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const searchBtn = document.getElementById("searchBtn");
    const ingredientInput = document.getElementById("ingredientInput");
    const resultsDiv = document.getElementById("results");
    const statusDiv = document.getElementById("status");
    const modal = document.getElementById("modal");
    const modalBody = document.getElementById("modal-body");
    const closeBtn = document.getElementById("close-btn");
    const favoritesGrid = document.getElementById("favorites-grid");

    // Load favorites from localStorage (or empty array if none saved)
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    // Show favorites on page load
    displayFavorites();

    // Search for meals by ingredient
    searchBtn.addEventListener("click", function() {
      const ingredient = ingredientInput.value;
      const url = `https://www.themealdb.com/api/json/v1/1/filter.php?i=${ingredient}`;

      statusDiv.innerHTML = "Loading...";
      resultsDiv.innerHTML = "";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          statusDiv.innerHTML = "";
          displayMeals(data.meals);
        })
        .catch(error => {
          statusDiv.innerHTML = "Something went wrong. Please try again.";
          console.log(error);
        });
    });

    // Display meal cards in a grid
    function displayMeals(meals) {
      if (!meals) {
        resultsDiv.innerHTML = "No meals found. Try a different ingredient!";
        return;
      }

      let html = "";
      for (let i = 0; i < meals.length; i++) {
        html += `<div class="meal-card" onclick="openRecipe('${meals[i].idMeal}')">
          <img src="${meals[i].strMealThumb}" alt="${meals[i].strMeal}">
          <p>${meals[i].strMeal}</p>
        </div>`;
      }
      resultsDiv.innerHTML = html;
    }

    // Fetch and show full recipe in modal
    function openRecipe(id) {
      const url = `https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`;
      modalBody.innerHTML = "Loading...";
      modal.style.display = "flex";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          const meal = data.meals[0];

          // Check if already saved
          const alreadySaved = favorites.some(f => f.id === meal.idMeal);

          // Collect ingredients
          let ingredients = "";
          for (let i = 1; i <= 20; i++) {
            const ingredient = meal[`strIngredient${i}`];
            const measure = meal[`strMeasure${i}`];
            if (ingredient && ingredient.trim() !== "") {
              ingredients += `<li>${measure} ${ingredient}</li>`;
            }
          }

          modalBody.innerHTML = `
            <h2>${meal.strMeal}</h2>
            <img src="${meal.strMealThumb}" width="100%">
            <button class="save-btn" onclick="toggleFavorite('${meal.idMeal}', '${meal.strMeal}', '${meal.strMealThumb}')">
              ${alreadySaved ? "❤️ Saved" : "🤍 Save to Favorites"}
            </button>
            <h3>Ingredients</h3>
            <ul>${ingredients}</ul>
            <h3>Instructions</h3>
            <p>${meal.strInstructions}</p>
          `;
        })
        .catch(error => {
          modalBody.innerHTML = "Could not load recipe. Please try again.";
        });
    }

    // Save or remove a meal from favorites
    function toggleFavorite(id, name, thumb) {
      const alreadySaved = favorites.some(f => f.id === id);

      if (alreadySaved) {
        // Remove from favorites
        favorites = favorites.filter(f => f.id !== id);
      } else {
        // Add to favorites
        favorites.push({ id, name, thumb });
      }

      // Save updated favorites to localStorage
      localStorage.setItem("favorites", JSON.stringify(favorites));

      // Refresh favorites display and reopen recipe to update button
      displayFavorites();
      openRecipe(id);
    }

    // Display saved favorites
    function displayFavorites() {
      if (favorites.length === 0) {
        favoritesGrid.innerHTML = "<p>No favorites saved yet.</p>";
        return;
      }

      let html = "";
      for (let i = 0; i < favorites.length; i++) {
        html += `<div class="meal-card" onclick="openRecipe('${favorites[i].id}')">
          <img src="${favorites[i].thumb}" alt="${favorites[i].name}">
          <p>${favorites[i].name}</p>
        </div>`;
      }
      favoritesGrid.innerHTML = html;
    }

    // Close modal
    closeBtn.addEventListener("click", function() {
      modal.style.display = "none";
    });

    // Close modal if user clicks outside the box
    modal.addEventListener("click", function(e) {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });
  </script>

</body>
</html>
